name: Build and Deploy

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix
          
      - name: Prepare web
        shell: bash
        run: |
          set -euo pipefail
          W4S_DIR="web/share/www/w4s"
          SHA="${GITHUB_SHA::7}"
          export SHA
          ASSETS=("script.js" "styles.css" "functions.php" "icons.svg")
          for f in "${ASSETS[@]}"; do
            src="$W4S_DIR/$f"
            [ -f "$src" ] || continue
            ext="${f##*.}"
            base="${f%.*}"
            mv "$src" "$W4S_DIR/${base}-${SHA}.${ext}"
          done
          node -e 'const fs=require("fs"); const sha=process.env.SHA||""; if(!sha) throw new Error("Missing SHA env"); const files=["styles.css","script.js","functions.php","icons.svg"]; let s=fs.readFileSync("web/share/www/w4s/index.php","utf8"); for(const f of files){ const i=f.lastIndexOf("."); const base=i>=0?f.slice(0,i):f; const ext=i>=0?f.slice(i+1):""; const to=ext?(base+"-"+sha+"."+ext):(base+"-"+sha); s=s.split(f).join(to); } fs.writeFileSync("web/share/www/w4s/index.php", s);'

      - name: Build package
        run: make web4static-ipk

      - name: Upload files
        uses: actions/upload-artifact@v7
        with:
          name: web4static
          path: ./out/web4static_*.ipk
          if-no-files-found: error

      - name: Summary
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls ./out/web4static_*.ipk >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  publish-latest-release:
    runs-on: ubuntu-22.04
    needs: [ build-package ]
    env:
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: ./VERSION
          trim: true
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: out
          merge-multiple: true

      - name: Resolve latest target release
        id: target-release
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const picked = releases.find((rel) => !rel.draft && !rel.prerelease);
            if (!picked) {
              core.setFailed('No release found to update');
              return;
            }

            core.setOutput('id', String(picked.id));
            core.setOutput('tag', picked.tag_name);

      - name: Remove previous web4static ipk assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.target-release.outputs.id }}
        run: |
          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets" \
            --jq '.[] | select(.name | test("^web4static_.*\\.ipk$")) | .id' \
            | while read -r asset_id; do
                [ -n "$asset_id" ] || continue
                gh api -X DELETE "repos/${{ github.repository }}/releases/assets/${asset_id}"
              done

      - name: Upload new web4static ipk assets to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.target-release.outputs.tag }}
        run: |
          ls -la ./out/web4static_*.ipk
          gh release upload "$TAG" ./out/web4static_*.ipk --clobber

      - name: Summary
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Updated channel: release" >> $GITHUB_STEP_SUMMARY
          echo "Release tag: ${{ steps.target-release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          ls ./out/web4static_*.ipk >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Dispatch
        if: success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.AGGREGATOR_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/spatiumstas/feedly/dispatches \
            -d '{"event_type":"package-built","client_payload":{"package":"${{ github.repository }}","channel":"release","tag":"${{ steps.target-release.outputs.tag }}"}}'